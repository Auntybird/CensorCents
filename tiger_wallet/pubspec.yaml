name: CensorCents
description: "CensorCents — a gamified budgeting app with an AI 'strict Asian parent' accountability partner."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # --- Backend / Auth / DB ---
  supabase_flutter: ^2.5.6

  # --- Config / Secrets ---
  flutter_dotenv: ^6.0.1

  # --- Networking (Groq API) ---
  http: ^1.2.1

  # --- State management ---
  provider: ^6.1.2

  # --- UI polish ---
  intl: ^0.20.3
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/avatars/
    - assets/icon/
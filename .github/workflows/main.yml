name: Build Tiger Wallet APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Generate .env from GitHub Secrets
        run: |
          cat <<EOT > tiger_wallet/.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL=${{ secrets.GROQ_MODEL }}
          EOT

      - name: Install dependencies
        run: flutter pub get
        working-directory: tiger_wallet

      - name: Build release APK
        run: flutter build apk --release
        working-directory: tiger_wallet

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiger-wallet-release-apk
          path: tiger_wallet/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
